<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart EduBuddy - Classroom Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .status {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .status.online {
            background: #d4edda;
            color: #155724;
        }

        .status.offline {
            background: #f8d7da;
            color: #721c24;
        }

        .question-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 60px 40px;
            border-radius: 25px;
            margin: 30px 0;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-text {
            color: white;
            font-size: 4em;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            line-height: 1.3;
        }

        .waiting-text {
            color: white;
            font-size: 2.5em;
            opacity: 0.8;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
            gap: 20px;
        }

        .score-item {
            flex: 1;
            padding: 20px;
            border-radius: 15px;
            font-size: 1.5em;
        }

        .score-correct {
            background: #d4edda;
            color: #155724;
        }

        .score-wrong {
            background: #f8d7da;
            color: #721c24;
        }

        .score-total {
            background: #d1ecf1;
            color: #0c5460;
        }

        /* Feedback Overlay */
        .feedback-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-in;
        }

        .feedback-overlay.show {
            display: flex;
        }

        .feedback-overlay.correct {
            background: rgba(40, 167, 69, 0.95);
        }

        .feedback-overlay.wrong {
            background: rgba(220, 53, 69, 0.95);
        }

        .feedback-content {
            text-align: center;
            color: white;
        }

        .feedback-icon {
            font-size: 15em;
            margin-bottom: 30px;
            animation: scaleIn 0.5s ease-out;
        }

        .feedback-text {
            font-size: 5em;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .connection-info {
            margin-top: 20px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎓 Smart EduBuddy 🎓</h1>

        <div class="status" id="status">
            <span id="status-text">Connecting to system...</span>
        </div>

        <div class="question-box">
            <div class="waiting-text" id="question-display">
                Waiting for teacher to start...
            </div>
        </div>

        <div class="score-board">
            <div class="score-item score-correct">
                <div style="font-size: 0.8em;">✓ Correct</div>
                <div style="font-size: 2em; font-weight: bold;" id="correct-count">0</div>
            </div>
            <div class="score-item score-total">
                <div style="font-size: 0.8em;">Total Attempts</div>
                <div style="font-size: 2em; font-weight: bold;" id="total-count">0</div>
            </div>
            <div class="score-item score-wrong">
                <div style="font-size: 0.8em;">✗ Wrong</div>
                <div style="font-size: 2em; font-weight: bold;" id="wrong-count">0</div>
            </div>
        </div>

        <div class="connection-info">
            MQTT Status: <span id="mqtt-status">Disconnected</span> |
            Device Status: <span id="device-status">Waiting...</span>
        </div>
    </div>

    <!-- Feedback Overlay -->
    <div class="feedback-overlay" id="feedback-overlay">
        <div class="feedback-content">
            <div class="feedback-icon" id="feedback-icon">✓</div>
            <div class="feedback-text" id="feedback-text">Correct!</div>
        </div>
    </div>



    <script src="dashboard.js"></script>
</body>

</html>
